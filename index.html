    <template id="tmpl-how-it-works">
      <div class="modal-content">
        <h2 class="modal-title">how it works</h2>
        <ol class="steps">
          <li>
            <span class="step-num">01</span>
            <div>
              <h3>paste a token</h3>
              <p>
                Drop in a JWT — by paste, <code>Cmd/Ctrl+V</code>, the clipboard
                button, or by dragging a <code>.txt</code>/<code>.jwt</code> file.
                It stays in this tab's memory; it is never sent anywhere, never
                stored, never put in the URL.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">02</span>
            <div>
              <h3>decode locally</h3>
              <p>
                tokenpeek splits the token on its dots and base64url-decodes the
                header and payload right here in JavaScript. Standard claims
                (<code>exp</code>, <code>nbf</code>, <code>iat</code>, …) are
                rendered as human-readable times with a live expiry badge.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">03</span>
            <div>
              <h3>verify the signature</h3>
              <p>
                Paste the HMAC secret (HS256/384/512) or the public key as PEM or
                JWK (RS/PS/ES/EdDSA). The Web Crypto API verifies the signature
                in-browser and tells you pass or fail — and exactly why.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">04</span>
            <div>
              <h3>crack weak secrets</h3>
              <p>
                For HS256-family tokens, run the signature against a built-in
                weak-secret wordlist (and your own list) in a Web Worker. If the
                secret is guessable, tokenpeek finds it — locally, with a live
                throughput readout. Great for auditing your own APIs.
              </p>
            </div>
          </li>
          <li>
            <span class="step-num">05</span>
            <div>
              <h3>forge &amp; generate</h3>
              <p>
                Edit the header/payload and re-sign to mint a test token, or
                generate a fresh RSA/EC keypair as PEM. Everything is produced by
                Web Crypto in your browser — copy or download, nothing uploads.
              </p>
            </div>
          </li>
        </ol>
      </div>
    </template>

    <template id="tmpl-security">
      <div class="modal-content">
        <h2 class="modal-title">threat model</h2>
        <div class="security-grid">
          <div class="security-card good">
            <h3>what's protected</h3>
            <ul>
              <li>The token — decoded entirely in-tab, never uploaded, never stored, never placed in the URL</li>
              <li>Any secret, PEM or JWK you paste to verify, crack or sign — used only in memory by Web Crypto</li>
              <li>Generated private keys — created in your browser and never transmitted</li>
            </ul>
          </div>
          <div class="security-card bad">
            <h3>what isn't</h3>
            <ul>
              <li>The first page load comes from GitHub Pages' CDN, which sees your IP and that you opened tokenpeek (not your token). After that the PWA runs fully offline</li>
              <li>A JWT is <em>not</em> encrypted — anyone holding the token can read its claims; tokenpeek just shows you that</li>
              <li>The crack wordlist only catches <em>weak</em> secrets — "not found" is not proof a secret is strong</li>
            </ul>
          </div>
          <div class="security-card">
            <h3>trust model</h3>
            <ul>
              <li>The static bundle (hash-pinned by the GitHub Pages deploy) and the TLS chain to GitHub Pages</li>
              <li>No third-party fonts or trackers; your tokens never leave the device. The CSP allows only the app itself plus the cookie-less Cloudflare Web Analytics beacon</li>
              <li>No JWKS is fetched: you paste the key, so no third party learns which key you're checking</li>
            </ul>
          </div>
        </div>
      </div>
    </template>

    <template id="tmpl-about">
      <div class="modal-content">
        <h2 class="modal-title">about tokenpeek</h2>
        <p class="about-lede">
          The offline alternative to "JWT decoder" websites. tokenpeek decodes,
          inspects, verifies, cracks weak secrets, and forges JSON Web Tokens —
          all in your browser, with zero backend and zero runtime dependencies.
        </p>
        <p>
          Built because pasting a production access token into a random online
          decoder is a genuine security risk: that token may carry real
          credentials and PII. tokenpeek gives you the same workflow without ever
          letting a byte leave your machine.
        </p>

        </p>
