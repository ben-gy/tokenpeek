<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="tokenpeek">
  <defs>
    <linearGradient id="tp-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0e17" />
  <!-- three token segments -->
  <rect x="5" y="9" width="6" height="3.2" rx="1" fill="#e879f9" />
  <rect x="12.5" y="9" width="9" height="3.2" rx="1" fill="#22d3ee" />
  <rect x="23" y="9" width="4" height="3.2" rx="1" fill="#f59e0b" />
  <!-- lens peeking at the token -->
  <circle cx="14" cy="20" r="6.2" fill="none" stroke="url(#tp-grad)" stroke-width="2.4" />
  <circle cx="14" cy="20" r="2.4" fill="#22d3ee" opacity="0.85" />
  <line x1="18.6" y1="24.6" x2="25" y2="27.5" stroke="url(#tp-grad)" stroke-width="2.6" stroke-linecap="round" />
</svg>
